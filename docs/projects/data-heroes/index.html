<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Heroes — MLOps Arcade</title>
<link rel="stylesheet" href="shared/shared.css">
<style>
  body { overflow-y: auto; }

  #matrix-bg { position: fixed; inset: 0; z-index: 0; }

  .hub {
    position: relative;
    z-index: 10;
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { text-align: center; margin-bottom: 48px; }

  h1 {
    font-size: clamp(2.5rem, 7vw, 4.5rem);
    letter-spacing: 0.18em;
    color: #fff;
    text-shadow: 0 0 12px var(--mx-bright), 0 0 40px var(--mx-dark);
  }
  .tagline {
    margin-top: 10px;
    color: var(--mx-medium);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-size: clamp(0.8rem, 2vw, 1rem);
  }
  .divider {
    width: 220px; height: 2px; margin: 22px auto 0;
    background: linear-gradient(90deg, transparent, var(--mx-bright), transparent);
    box-shadow: 0 0 10px var(--mx-bright);
  }

  .pipeline {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 22px;
  }

  .tile {
    position: relative;
    background: rgba(0, 20, 6, 0.72);
    border: 2px solid var(--mx-dark);
    border-radius: 10px;
    padding: 22px 22px 56px;
    cursor: pointer;
    transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
    overflow: hidden;
  }
  .tile:hover { transform: translateY(-5px); }
  .tile .order {
    font-size: 0.75rem; letter-spacing: 0.2em; opacity: 0.7; margin-bottom: 8px;
  }
  .tile h2 { font-size: 1.4rem; margin-bottom: 4px; color: #fff; }
  .tile .stage { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--mx-medium); margin-bottom: 12px; }
  .tile p { font-size: 0.85rem; line-height: 1.5; color: #9ab39a; }
  .tile .status {
    position: absolute; bottom: 18px; left: 22px;
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.15em;
  }
  .tile .status.live::before {
    content: ''; display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-right: 7px; vertical-align: middle; background: currentColor;
    box-shadow: 0 0 6px currentColor; animation: pulse 2s infinite;
  }
  .tile.complete::after {
    content: '✓'; position: absolute; top: 14px; right: 18px; font-size: 1.5rem;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .team { text-align: center; margin-top: 56px; color: var(--mx-medium); }
  .team h3 { font-weight: normal; letter-spacing: 0.15em; margin-bottom: 16px; }
  .gallery { display: flex; justify-content: center; gap: 22px; flex-wrap: wrap; }
  .gallery img {
    width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
    border: 2px solid var(--mx-dark); transition: border-color .3s, box-shadow .3s;
  }
  .gallery img:hover { border-color: var(--mx-bright); box-shadow: 0 0 18px rgba(0,255,65,.5); }

  .back { display: inline-block; margin-top: 40px; color: var(--mx-medium); text-decoration: none; letter-spacing: 0.1em; font-size: 0.85rem; }
  .back:hover { color: var(--mx-bright); text-shadow: 0 0 10px var(--mx-bright); }

  #game-frame {
    display: none; position: fixed; inset: 0; width: 100%; height: 100%;
    border: none; z-index: 1000; background: #000;
  }
  .toast {
    position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%);
    background: rgba(0,30,8,.95); border: 1px solid var(--mx-dark); color: var(--mx-bright);
    padding: 12px 22px; border-radius: 6px; z-index: 1100; letter-spacing: .1em;
    box-shadow: 0 0 20px rgba(0,255,65,.25);
  }
</style>
</head>
<body>
  <div class="hub">
    <header>
      <h1>DATA HEROES</h1>
      <p class="tagline">The MLOps pipeline as a retro arcade</p>
      <div class="divider"></div>
    </header>

    <div class="pipeline" id="pipeline"></div>

    <div class="team">
      <h3>// YOUR DATA HEROES</h3>
      <div class="gallery" id="gallery"></div>
      <a class="back" href="../../index.html">‹ back to experimental</a>
    </div>
  </div>

  <iframe id="game-frame" title="game"></iframe>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="shared/shared.js"></script>
  <script src="hub-sketch.js"></script>
  <script src="hub.js"></script>
</body>
</html>
